# ═══════════════════════════════════════════════════════════════════
# tmux configuration for CodeBox
# ═══════════════════════════════════════════════════════════════════
# tmux provides session persistence (survives browser disconnects).
# By default the user sees only the coding agent.
#
# Keybindings — Option/Alt root keys (no prefix, work in browser):
#   Option-m      → toggle shell pane (25% height, bottom)
#   Option-s      → toggle status bar
#   Option-t      → toggle dark/light theme
#   Option-w      → toggle agent↔shell window
#   Option-h/j/k/l → navigate panes (vim-style)
#   Option-v      → split vertically (new agent session) [all layouts]
#   Option-\      → split vertically (alias, US/UK layouts only)
#   Option--      → split horizontally (new agent session)
#   Option-x      → close current pane
#   Option-X      → close all panes except current (reset to one)
#
# Prefix-based (Ctrl-Space — works via docker exec attach):
#   prefix H/J/K/L → resize panes (5 cells, repeatable)
#   prefix c       → new window
#   prefix r       → reload config
#   prefix Enter   → copy/scroll mode (vi keys)
# ═══════════════════════════════════════════════════════════════════

# ─── Terminal — passthrough with minimal interference ─────────────
# Use xterm-256color instead of tmux-256color so apps inside tmux
# see the same TERM the outer terminal (ttyd/xterm.js) advertises.
# This avoids capability mismatches where tmux-256color is missing
# features that xterm-256color has (e.g. bce, ccc, npc).
set -g default-terminal "xterm-256color"
# Enable 24-bit truecolor passthrough + colored underlines (Smulx)
set -ga terminal-overrides ",xterm-256color:Tc:Smulx=\\E[4::%p1%dm"
# Pass RGB sequences through unchanged to the outer terminal
set -ga terminal-features ",xterm-256color:RGB"
# Propagate COLORTERM so TUI apps detect truecolor without probing
set-environment -g COLORTERM truecolor

# ─── Unicode / UTF-8 ─────────────────────────────────────────────
# Allow applications to send escape sequences through tmux to the
# outer terminal (needed for some Unicode rendering in ttyd/xterm.js)
set -gq allow-passthrough on
# Propagate UTF-8 locale so all shells and TUI apps render correctly
set-environment -g LANG "C.UTF-8"
set-environment -g LC_ALL "C.UTF-8"

# ─── General ──────────────────────────────────────────────────────
set -g history-limit 50000
set -g escape-time 5
set -g focus-events on
set -g set-clipboard off
set -g mouse on
# Prevent window name from changing to "tmux" when entering copy mode
setw -g automatic-rename off
set  -g allow-rename off
# window-size latest: canvas tracks the most recently active client.
# SIGWINCH from the browser is sufficient — no explicit resize-window hook needed.
set  -g window-size latest

# ─── Copy / clipboard ────────────────────────────────────────────
# ttyd 1.7.7 has no OSC 52 / ClipboardAddon; the only browser→OS
# clipboard path is xterm.js native selection → execCommand('copy').
# Because `mouse on` puts tmux in application-mouse-mode, plain drag
# is captured by tmux and the browser never sees a selection.
#
# To copy to the OS clipboard, hold a modifier while dragging:
#   - macOS:           hold OPTION (⌥) — requires ttyd to be launched
#                      with -t macOptionClickForcesSelection=true (done
#                      in lib/modes.sh); Shift does NOT work on macOS
#   - Linux / Windows: hold SHIFT
# The modifier bypasses application-mouse-mode in xterm.js so the
# browser performs a native selection and auto-copies on release
# (HTTPS secure-context required, already enforced by lib/tls.sh).
#
# The copy-mode bindings below copy into tmux's paste buffer only
# (`prefix ]` to paste within tmux). They do NOT reach the OS clipboard.
setw -g mode-keys vi
bind -T copy-mode-vi v                send-keys -X begin-selection
bind -T copy-mode-vi y                send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDown1Pane   send-keys -X cancel
bind ] paste-buffer

# Start windows and panes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Prefix ───────────────────────────────────────────────────────
# Ctrl-Space avoids conflicts with opencode's TUI and works well
# on all keyboard layouts (including German)
set -g prefix C-Space
unbind C-b
unbind C-a
bind C-Space send-prefix

# ─── Pane management ─────────────────────────────────────────────
# Split panes (prefix-based)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation (prefix-based)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane nav + splits as Option root keys (work in browser)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-v split-window -h -c /workspace "/tmp/tmux-wrapper.sh --loop"
bind -n M-\\ split-window -h -c /workspace "/tmp/tmux-wrapper.sh --loop"
bind -n M-- split-window -v -c /workspace "/tmp/tmux-wrapper.sh --loop"
# Close current pane (Option-x) — confirms if it's the last pane
bind -n M-x kill-pane
# Close all panes except current (Option-X) — reset to single pane
bind -n M-X kill-pane -a

# Resize panes (prefix + Shift, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window management ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Status bar ──────────────────────────────────────────────────
# Theme files define status-left (label + git branch) and status-right (clock).
set -g status off
set -g status-position bottom
set -g status-interval 2

# ─── Theme ────────────────────────────────────────────────────────
# Colors are loaded from a separate theme file so they can be
# switched at runtime.  Default: Tokyo Night (dark).
# Toggle with:  Option-t
source-file /opt/opencode/tmux/tmux-theme-dark.conf


# ─── Quality of life ─────────────────────────────────────────────
# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"

# ─── Toggles (Option/Alt root keys — no prefix needed) ──────────
#   Option-m  → Toggle shell pane (25% height, bottom)
#   Option-s  → Toggle status bar
#   Option-t  → Toggle dark/light theme
#   Option-w  → Toggle agent↔shell window
bind -n M-m run-shell "bash /opt/opencode/tmux/shell-pane-toggle.sh"
bind -n M-s set-option -g status
bind -n M-t run-shell "bash /opt/opencode/tmux/tmux-theme-toggle.sh"
bind -n M-w if-shell "tmux list-windows -F '##W' | grep -q '^shell$'" \
    "last-window" \
    "new-window -n shell -c /workspace zsh"

# ─── Auto-respawn agent on /exit ─────────────────────────────────
# remain-on-exit keeps dead panes so pane-died hook can fire.
# Hook respawns the agent pane (window 1, pane 1) after 8s.
# Delay is intentionally long: after a sleep/wake cycle the Docker VM
# needs several seconds to re-establish network.
# All other dead panes (shell, etc.) are cleaned up immediately.
set -g remain-on-exit on
set-hook -g pane-died {
    if-shell "[ '#{window_index}' = '1' ] && [ '#{pane_index}' = '1' ]" {
        run-shell "sleep 8 && tmux respawn-pane -k -c /workspace -t '#{pane_id}' '/tmp/tmux-wrapper.sh --loop --respawn'"
    } {
        kill-pane -t '#{pane_id}'
    }
}
