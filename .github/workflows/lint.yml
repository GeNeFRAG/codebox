name: lint

on:
  push:
    paths:
      - '**.sh'
      - 'bin/**'
      - '.shellcheckrc'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.sh'
      - 'bin/**'
      - '.shellcheckrc'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          bash -n entrypoint.sh codebox.sh
          for f in lib/*.sh tmux/*.sh bin/mcp-run; do bash -n "$f"; done

      - name: shellcheck
        run: |
          shellcheck entrypoint.sh codebox.sh
          shellcheck lib/*.sh
          shellcheck tmux/*.sh
          shellcheck bin/mcp-run
