# ═══════════════════════════════════════════════════════════════════
# tmux configuration for opencode-docker (TUI mode)
# ═══════════════════════════════════════════════════════════════════

# ─── Terminal — passthrough with minimal interference ─────────────
# Use xterm-256color instead of tmux-256color so apps inside tmux
# see the same TERM the outer terminal (ttyd/xterm.js) advertises.
# This avoids capability mismatches where tmux-256color is missing
# features that xterm-256color has (e.g. bce, ccc, npc).
set -g default-terminal "xterm-256color"
# Enable 24-bit truecolor passthrough + colored underlines (Smulx)
set -ga terminal-overrides ",xterm-256color:Tc:Smulx=\\E[4::%p1%dm"
# Pass RGB sequences through unchanged to the outer terminal
set -ga terminal-features ",xterm-256color:RGB"
# Propagate COLORTERM so TUI apps detect truecolor without probing
set-environment -g COLORTERM truecolor

# ─── General ──────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# Start windows and panes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Prefix ───────────────────────────────────────────────────────
# Ctrl-a is more ergonomic than default Ctrl-b, and doesn't
# conflict with opencode's key bindings
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─── Pane management ─────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane cycling with Ctrl-a twice
bind C-a select-pane -t :.+

# ─── Window management ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Status bar ──────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 3

set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-left-length 20
# Right side: active subagent indicator + clock
# agent-status.sh outputs nothing when idle, or "N ⚡agent·names" when active
set -g status-right "#(bash /opt/opencode/agent-status.sh 2>/dev/null) #[fg=#565f89] %H:%M "
set -g status-right-length 50

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ─── Copy mode (vi keys) ─────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Quality of life ─────────────────────────────────────────────
# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"

# ─── Agent Monitor ───────────────────────────────────────────────
# Ctrl-a m  → Toggle agent monitor pane (25% height, bottom)
# Ctrl-a M  → Open monitor in a new window (full screen)
bind m if-shell "tmux list-panes -F '#{pane_title}' | grep -q agent-monitor" \
    "kill-pane -t '{bottom}'" \
    "split-window -v -l 25% -c /workspace 'printf \"\\033]2;agent-monitor\\033\\\\\" && bash /opt/opencode/agent-monitor.sh'"
bind M new-window -n "monitor" "bash /opt/opencode/agent-monitor.sh"

# Don't exit tmux when the last shell closes — the entrypoint
# manages the session lifecycle
set -g remain-on-exit off
