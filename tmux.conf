# ═══════════════════════════════════════════════════════════════════
# tmux configuration for opencode-docker (TUI mode)
# ═══════════════════════════════════════════════════════════════════

# ─── Terminal ─────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ─── General ──────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# Start windows and panes at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ─── Prefix ───────────────────────────────────────────────────────
# Ctrl-a is more ergonomic than default Ctrl-b, and doesn't
# conflict with opencode's key bindings
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─── Pane management ─────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane cycling with Ctrl-a twice
bind C-a select-pane -t :.+

# ─── Window management ───────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"

# ─── Status bar ──────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-left-length 20
set -g status-right "#[fg=#565f89] %H:%M "
set -g status-right-length 20

setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ─── Copy mode (vi keys) ─────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ─── Quality of life ─────────────────────────────────────────────
# Reload config
bind r source-file /root/.tmux.conf \; display "Config reloaded"

# Don't exit tmux when the last shell closes — the entrypoint
# manages the session lifecycle
set -g remain-on-exit off
